name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python 3.11, pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff mypy
      - name: Lint with ruff
        run: ruff check .
        continue-on-error: true
      - name: Compile-check every Python file
        run: python -m compileall -q .
      - name: Run pytest (offline tests only)
        env:
          GEMINI_API_KEY: test
          OPENROUTER_API_KEY: test
          NEO4J_URI: ""
          NEO4J_USERNAME: ""
          NEO4J_PASSWORD: ""
        run: pytest -q tests/

  frontend:
    name: Frontend (Node 20, tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install dependencies
        run: npm install --no-fund --no-audit
      - name: Type-check
        run: npm run type-check
        continue-on-error: true
      - name: Lint
        run: npm run lint
        continue-on-error: true

  alignment:
    name: Cross-file alignment (no em dashes, schemas in sync)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Em dash detector
        run: |
          if grep -rn $'\xe2\x80\x94' --include="*.py" --include="*.ts" --include="*.tsx" --include="*.md" .; then
            echo "::error::Em dash found in source. Use '-' instead."
            exit 1
          fi
          echo "No em dashes detected."
      - name: Required docs present
        run: |
          for f in README.md LICENSE SECURITY.md CHANGELOG.md \
                   docs/PRODUCT_DOC.md docs/TECHNICAL_DOC.md docs/DECISION_LOG.md \
                   docs/SETUP_GUIDE.md docs/DEMO_SCRIPT.md docs/COMPETITIVE_ANALYSIS.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required doc: $f"
              exit 1
            fi
          done
          echo "All required docs present."
